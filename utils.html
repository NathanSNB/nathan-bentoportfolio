<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utils | NatSNB68</title>
    <meta name="description" content="Générateur de QR Code de NatSNB68.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0a0a0e">
    <link rel="canonical" href="https://nathan.mathysie.eu/utils.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Utils/PP.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-deep: #0a0a0e;
            --text-light: #f8fafc;
            --text-dark: #0f172a;
            --radius-app: 32px;
            --radius-card: 24px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6, .nav-links a {
            font-family: 'DynaPuff', cursive;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(192, 132, 252, 0.15), transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(249, 115, 22, 0.1), transparent 40%);
            filter: blur(60px);
        }

        .app-container {
            background-color: rgba(24, 24, 27, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: var(--radius-app);
            padding: 1.5rem;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        .nav-links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-light);
        }

        .card {
            border-radius: var(--radius-card);
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(39, 39, 42, 0.75);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .sub-text {
            font-size: 0.95rem;
            opacity: 0.85;
            line-height: 1.5;
            font-weight: 500;
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Outfit';
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .input-group input[type="text"]:focus {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
        }

        .qr-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .control-group label {
            font-size: 0.8rem;
            opacity: 0.8;
            font-weight: 600;
        }

        .qr-controls input[type="color"] {
            width: 100%;
            height: 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .qr-controls input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--text-light);
        }

        .actions-row {
            display: flex;
            gap: 1rem;
        }

        .btn-primary,
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .action-btn {
            background: transparent;
            color: inherit;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .action-btn:hover,
        .btn-primary:hover {
            transform: translateY(-2px);
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            padding: 2rem;
            border-radius: 16px;
            margin-top: 1rem;
            min-height: 200px;
            transition: var(--transition);
        }

        .page-footer {
            width: 100%;
            max-width: 900px;
            margin-top: 1.25rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 1rem;
            color: rgba(248, 250, 252, 0.72);
            font-size: 0.9rem;
        }

        .page-footer a {
            color: inherit;
            text-decoration: none;
            font-weight: 700;
        }

        .page-footer .footer-left {
            justify-self: start;
        }

        .page-footer .footer-center {
            justify-self: center;
            text-align: center;
        }

        .page-footer .footer-right {
            justify-self: end;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .app-container {
                padding: 1rem;
            }

            .card {
                padding: 1.4rem;
            }

            .qr-controls,
            .actions-row {
                grid-template-columns: 1fr;
                flex-direction: column;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="background-blobs"></div>
    <div class="app-container">
        <header>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <div style="width: 12px; height: 12px; border-radius: 50%; background: #f87171;"></div>
                <div style="width: 12px; height: 12px; border-radius: 50%; background: #facc15;"></div>
                <div style="width: 12px; height: 12px; border-radius: 50%; background: #4ade80;"></div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Bento</a>
                <a href="utils.html" class="active">Utils</a>
            </nav>
        </header>

        <main>
            <section>
                <div class="card">
                    <h2>Générateur de QR Code</h2>
                    <p class="sub-text" style="margin-bottom: 1.5rem;">Personnalisez et générez vos codes instantanément.</p>

                    <div class="input-group">
                        <input type="text" id="qr-input" placeholder="Ex: https://www.google.com/" autocomplete="off">
                    </div>

                    <div class="qr-controls">
                        <div class="control-group">
                            <label for="qr-color-dark">Couleur du code</label>
                            <input type="color" id="qr-color-dark" value="#0f172a">
                        </div>
                        <div class="control-group">
                            <label for="qr-color-light">Couleur de fond</label>
                            <input type="color" id="qr-color-light" value="#ffffff">
                        </div>
                        <div class="control-group" style="grid-column: span 2;">
                            <label for="qr-size">Taille de l'image (<span id="size-val">200</span>px)</label>
                            <input type="range" id="qr-size" min="150" max="400" step="10" value="200">
                        </div>
                    </div>

                    <div class="actions-row">
                        <button class="btn-primary" id="generate-btn">Générer</button>
                        <button class="action-btn" id="download-btn" style="display: none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Télécharger
                        </button>
                    </div>

                    <div id="qrcode">
                        <span style="color: #999; font-weight: 500;" id="qr-placeholder">Le QR Code s'affichera ici.</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="page-footer">
        <a class="footer-left" href="index.html">Retour à l'accueil</a>
        <p class="footer-center">Développé avec ❤️ par Nathan.</p>
        <a class="footer-right" href="mentions-legales.html">Mention légale</a>
    </footer>

    <script>
        const qrInput = document.getElementById('qr-input');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const qrContainer = document.getElementById('qrcode');
        const colorDark = document.getElementById('qr-color-dark');
        const colorLight = document.getElementById('qr-color-light');
        const sizeInput = document.getElementById('qr-size');
        const sizeVal = document.getElementById('size-val');

        sizeInput.addEventListener('input', event => {
            sizeVal.textContent = event.target.value;
        });

        function generateQRCode() {
            const text = qrInput.value.trim();
            if (!text) {
                return;
            }

            const size = parseInt(sizeInput.value, 10);
            qrContainer.innerHTML = '';
            qrContainer.style.background = colorLight.value;

            new QRCode(qrContainer, {
                text,
                width: size,
                height: size,
                colorDark: colorDark.value,
                colorLight: colorLight.value,
                correctLevel: QRCode.CorrectLevel.H
            });

            downloadBtn.style.display = 'flex';
        }

        generateBtn.addEventListener('click', generateQRCode);
        qrInput.addEventListener('keypress', event => {
            if (event.key === 'Enter') {
                generateQRCode();
            }
        });

        downloadBtn.addEventListener('click', () => {
            const imgElement = qrContainer.querySelector('img');
            const canvasElement = qrContainer.querySelector('canvas');
            let imageURI = '';

            if (imgElement && imgElement.src) {
                imageURI = imgElement.src;
            } else if (canvasElement) {
                imageURI = canvasElement.toDataURL('image/png');
            }

            if (imageURI) {
                const link = document.createElement('a');
                link.href = imageURI;
                link.download = `QR-NatSNB68-${new Date().getTime()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });
    </script>
</body>
</html>
